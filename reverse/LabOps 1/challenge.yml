description: |-
  ## Description (français)

  Votre superviseur de laboratoire vous a demandé d'utiliser un nouvel outil pour collecter et analyser de nouveaux échantillons de laboratoire.<br>
  Malheureusement, le service informatique n'a plus de clés de licence, mais vous avez promis d'avoir les rapports prêts avant la fin de la journée...<br>

  Serez-vous en mesure de collecter les flags à temps ?

  ## Description (english)

  Your lab supervisor has asked you to use a new tool to collect and analyze new lab samples.<br>
  Unfortunately, the IT department ran out of license keys but you promised to have the reports ready by the end of day...<br>

  Will you be able to collect the flags in time?

