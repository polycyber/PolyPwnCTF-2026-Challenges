description: |-
  ## Description (français)

  Le premier accès vous a fourni des informations utiles, mais les opérateurs de Nexus Labs sont prudents — ou du moins, ils pensent l'être. Des éléments ont été cachés, mais « cachés » ne signifie pas « effacés ».

  Même instance que l'étape 1.

  ## Description (english)

  The first foothold gave you something useful, but Nexus Labs' operators are careful — or so they think. Some material has been removed, but "removed" doesn't mean "gone".

  Same instance as stage 1.

