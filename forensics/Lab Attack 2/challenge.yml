name: Lab Attack 2
author: ChrichriGeorgie
category: forensics

type: standard
value: 5


description: |-
  ## Description (français)
  
  Le Dr. Moreau a reçu un appel du "support technique". Depuis l'appel, son poste semble avoir été compromis. Comprenez ce qui se cache derrière l'attaque.
  
  Quel est le nom du premier fichier malicieux téléchargé par l'attaquant?
  
  Format de flag: POLYCYBER{nomfichier.extension}
  
  ## Description (english)
  
  Dr. Moreau received a call from "IT support". Since then, his workstation seemed to have been compromised. Uncover what lies beneath the attack.
  
  What is the name of the first malicious file downloaded by the threat actor?
  
  Flag format: POLYCYBER{filename.extension}

flags:
- POLYCYBER{support_fix.bat}

requirements:
    - "Lab Attack 1"

