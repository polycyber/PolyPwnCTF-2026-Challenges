<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARC-7 · subsurface recovery console</title>
  <style>
    :root {
      --phosphor: #33ff66;
      --phosphor-dim: rgba(51, 255, 102, 0.22);
      --void: #070807;
      --amber-warn: #c9a227;
    }
    * { box-sizing: border-box; }
    html {
      /* chassis etching — matches silo DNS zone (low contrast) */
      --chassis-barcode: "vault.arc7.lemaires.fr";
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--void);
      color: var(--phosphor);
      font-family: "Consolas", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.45;
      text-shadow: 0 0 6px var(--phosphor-dim);
    }
    .crt {
      max-width: 52rem;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 3rem;
      border: 1px solid #1a2f1a;
      min-height: 100vh;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.14),
          rgba(0, 0, 0, 0.14) 1px,
          transparent 1px,
          transparent 3px
        ),
        radial-gradient(ellipse at center, #0d140d 0%, var(--void) 72%);
    }
    .crt::after {
      content: var(--chassis-barcode);
      display: block;
      margin-top: 2rem;
      font-size: 9px;
      letter-spacing: 0.04em;
      color: #0d160d;
      user-select: text;
    }
    h1 {
      font-size: 1rem;
      font-weight: normal;
      color: var(--amber-warn);
      margin: 0 0 1rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    .log {
      white-space: pre-wrap;
      word-break: break-all;
    }
    .dim { color: rgba(51, 255, 102, 0.45); }
    .warn { color: var(--amber-warn); }
    .blink { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .sticker {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }
  </style>
  <!-- silo-ticket# ARC7-DEEP XyQ2wLp9 · checksum lane (pre-collapse) -->
  <!--
    [RECOVERED PATCH — DO NOT RUN]
    // wrong-endian prototype; kept for audit
    function fakePull(host) {
      return md5(host).slice(0,8) + ".INVALID";
    }
  -->
</head>
<body>
  <div class="crt">
    <span class="sticker" aria-hidden="true" data-plate="XyQ2wLp9"></span>
    <h1>Containment lab · data salvage</h1>
    <div class="log" id="boot"></div>
    <p class="dim blink" id="cursor-line" style="margin-top:1rem;">_</p>
  </div>
  <script>
    (function () {
      const lines = [
        "[2089-03-14T04:11:02Z] ARC-7 wake: battery 3% · atmospheric seal UNKNOWN",
        "[2089-03-14T04:11:03Z] Storage arrays: PHYSICAL LOSS · checksums only in RF shadow",
        "[2089-03-14T04:11:04Z] Last operator note: \"they moved the readable web into the air\"",
        "[2089-03-14T04:11:05Z] Surface mirror advertises root label Qm9nVXM0 — DO NOT TRUST (stale cache)",
        "[2089-03-14T04:11:06Z] Deep manifest: not on disk · scattered as DNS text fragments (recovery unknown)",
        "[2089-03-14T04:11:07Z] Hint: chassis barcode scanned as illegible — cross-check environmental metadata",
        "[2089-03-14T04:11:08Z] Interference pattern suggests ordered reassembly after decompression",
        "[2089-03-14T04:11:09Z] STATUS: awaiting manual recovery protocol · no outbound routes",
      ];
      const boot = document.getElementById("boot");
      let i = 0;
      function typeLine() {
        if (i >= lines.length) {
          document.getElementById("cursor-line").textContent = "> awaiting operator input (none configured) _";
          return;
        }
        boot.textContent += (i ? "\n" : "") + lines[i];
        i++;
        setTimeout(typeLine, 380 + Math.random() * 220);
      }
      typeLine();
    })();
  </script>
</body>
</html>
