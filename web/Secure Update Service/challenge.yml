description: |-
  ## Description (français)

  J'ai entendu dire que le labo a récemment déployé un nouveau service de déploiement de mises à jour.
  Avec les expériences qu'ils font...disons que j'aimerais avoir un certain levier.
  Peut-être tu pourrais me donner accès à son serveur ?

  NOTE: Pour partager des ports, le port non HTTP est disponible à utiliser avec https://github.com/ekzhang/bore/
    Exemple: `bore local -t <server> -p <dest_port> <local_port>`

  ## Description (english)

  I heard that the lab recently deployed a new update deployment service.
  With the experiments going on here... let's say I'd like some leverage.
  Maybe you can get me access to its server?

  NOTE: To forward ports, the non HTTP port is available to use with https://github.com/ekzhang/bore/
    Example: `bore local -t <server> -p <dest_port> <local_port>`

