  ## Description (français)

  Nos concurrents au laboratoire COMET ont créé une nouvelle application de visualisation de molécules d'ADN, et ils cachent une séquence secrète d'ADN sur leurs serveurs qu'ils ont découverte grâce à ce nouvel outil de modélisation de nucléotides.<br>
