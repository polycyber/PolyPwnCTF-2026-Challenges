<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralOS Terminal v0.2.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080808;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── CRT monitor frame ── */
        .monitor {
            background: linear-gradient(145deg, #222 0%, #1a1a1a 50%, #111 100%);
            border-radius: 24px;
            padding: 28px;
            box-shadow:
                0 0 40px rgba(0,0,0,.9),
                inset 0 2px 0 rgba(255,255,255,.05),
                inset 0 -2px 0 rgba(0,0,0,.5);
            width: 92vw;
            height: 88vh;
            max-width: 1050px;
            position: relative;
        }

        .monitor::after {
            content: '● NeuralOS';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-family: 'VT323', monospace;
            font-size: 12px;
            letter-spacing: 3px;
        }

        /* ── Phosphor screen ── */
        .screen {
            background: #0a140a;
            border-radius: 12px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            box-shadow:
                inset 0 0 80px rgba(0,50,0,.15),
                0 0 8px rgba(51,255,51,.05);
        }

        /* scanlines */
        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,.12) 0px,
                rgba(0,0,0,.12) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* flicker */
        .screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(18,16,16,.1);
            opacity: 0;
            pointer-events: none;
            z-index: 11;
            animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0%   { opacity: 0; }
            3%   { opacity: .06; }
            6%   { opacity: 0; }
            7%   { opacity: .04; }
            8%   { opacity: 0; }
            50%  { opacity: 0; }
            53%  { opacity: .03; }
            54%  { opacity: 0; }
            100% { opacity: 0; }
        }

        /* vignette */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.45) 100%);
            pointer-events: none;
            z-index: 9;
            border-radius: 12px;
        }

        /* ── Terminal text ── */
        .terminal {
            font-family: 'VT323', 'Courier New', monospace;
            color: #33ff33;
            font-size: 19px;
            padding: 22px;
            height: 100%;
            display: flex;
            flex-direction: column;
            line-height: 1.4;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            scrollbar-width: none;
        }
        #output::-webkit-scrollbar { display: none; }

        #output div {
            text-shadow: 0 0 6px rgba(51,255,51,.4);
        }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .prompt {
            margin-right: 8px;
            white-space: nowrap;
            text-shadow: 0 0 6px rgba(51,255,51,.4);
        }

        #cmdInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #33ff33;
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 19px;
            outline: none;
            caret-color: #33ff33;
            text-shadow: 0 0 6px rgba(51,255,51,.4);
            line-height: 1.4;
        }

        .cmd-echo  { color: #55cc55; }
        .error     { color: #ff4444 !important; text-shadow: 0 0 6px rgba(255,68,68,.4) !important; }
        .warn      { color: #ffaa33 !important; text-shadow: 0 0 6px rgba(255,170,51,.4) !important; }
        .dim       { color: #1a8c1a !important; text-shadow: none !important; }
    </style>
</head>
<body>
<div class="monitor">
    <div class="screen">
        <div class="vignette"></div>
        <div class="terminal">
            <div id="output"></div>
            <div class="input-line">
                <span class="prompt">NeuralOS&gt; </span>
                <input type="text" id="cmdInput" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>
</div>

<script>
const output  = document.getElementById('output');
const input   = document.getElementById('cmdInput');
const history = [];
let   histIdx = -1;

/* ── Boot sequence ── */
const BOOT = [
    { t: '══════════════════════════════════════════════════', d: 0 },
    { t: '   INSTITUT VOSS - SYSTEME D\'EXPLOITATION NEURAL', d: 80 },
    { t: '   NeuralOS v0.2.1 [Build 2032.03.15]', d: 80 },
    { t: '══════════════════════════════════════════════════', d: 80 },
    { t: '', d: 150 },
    { t: 'Initialisation des voies neurales...... OK',            d: 250 },
    { t: 'Chargement banques mémoire............ 43% RÉCUPÉRÉ', d: 250 },
    { t: 'Établissement liaison réseau.......... MODE ISOLÉ',   d: 250 },
    { t: 'Montage dossiers du labo.............. 5 DOSSIERS TROUVÉS', d: 250 },
    { t: '', d: 150 },
    { t: '⚠ ATTENTION: Système en MODE D\'URGENCE',                    d: 350, c: 'warn' },
    { t: '⚠ L\'accès au Labo 7 a été SCELLÉ par directive de l\'Institut', d: 180, c: 'warn' },
    { t: '⚠ Toutes les opérations du terminal sont SURVEILLÉES',     d: 180, c: 'warn' },
    { t: '', d: 150 },
    { t: 'Tapez "aide" pour les commandes disponibles.', d: 200, c: 'dim' },
    { t: '', d: 0 },
];

function line(text, cls) {
    const div = document.createElement('div');
    if (cls) div.className = cls;
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function boot() {
    input.disabled = true;
    for (const l of BOOT) {
        await sleep(l.d);
        line(l.t, l.c || '');
    }
    input.disabled = false;
    input.focus();
}

/* ── Send command to server ── */
async function send(cmd) {
    line(`NeuralOS> ${cmd}`, 'cmd-echo');

    if (cmd.toLowerCase().trim() === 'clear') {
        output.innerHTML = '';
        return;
    }

    try {
        const res  = await fetch('/api/terminal', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: cmd })
        });
        const data = await res.json();

        if (data.output === '__CLEAR__') {
            output.innerHTML = '';
        } else {
            line(data.output);
        }
    } catch {
        line('ERR: CONNEXION AU CŒUR NEURAL PERDUE', 'error');
    }
    line('');
}

/* ── Keyboard ── */
input.addEventListener('keydown', async e => {
    if (e.key === 'Enter') {
        const cmd = input.value.trim();
        input.value = '';
        if (!cmd) return;
        history.push(cmd);
        histIdx = history.length;
        input.disabled = true;
        await send(cmd);
        input.disabled = false;
        input.focus();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
        else { histIdx = history.length; input.value = ''; }
    }
});

document.addEventListener('click', () => { if (!input.disabled) input.focus(); });

boot();
</script>
</body>
</html>
