  ## Description (english)

  After locking you out of your laboratory, Mandark thought brute force and bad science would keep you out forever. But you are nothing if not persistent! <br>
  After a dramatic fight against your own defense systems, you are finally back inside your lab. Unfortunately, Mandark didnt leave empty-handed. Before fleeing, he encrypted a crucial message and left it behind, mocking you with mathematics he thought would never be undone. <br>
  The message is locked behind RSA encryption, and the lab systems refuse to cooperate. You need to recover the original plaintext. <br>
  Science prevails. Mandark fails.

