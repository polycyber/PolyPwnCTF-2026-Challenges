description: |-
  ## Description (français)

  Après t'avoir enfermé hors de ton laboratoire, Mandark pensait que la force brute et la mauvaise science te tiendraient à l'écart pour toujours. Mais vous êtes persévérant, c'est le moins qu'on puisse dire ! <br>
  Après un combat acharné contre vos propres systèmes de défense, vous êtes enfin de retour dans votre laboratoire. Malheureusement, Mandark n'est pas reparti les mains vides. Avant de s'enfuir, il a crypté un message crucial et l'a laissé derrière lui, se moquant de vous avec des mathématiques qu'il pensait impossibles à déchiffrer.<br>
  Le message est verrouillé par un cryptage RSA, et les systèmes du laboratoire refusent de coopérer. Vous devez récupérer le texte en clair d'origine. <br>
  La science l'emporte. Mandark échoue.

